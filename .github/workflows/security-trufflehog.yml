name: "Security: TruffleHog Secrets Scan"

on:
  workflow_call:

jobs:
  trufflehog:
    name: TruffleHog Deep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d # v3.93.8
        with:
          extra_args: --only-verified --results=verified,unknown

      - name: Scan summary
        if: always()
        run: |
          echo "## TruffleHog Deep Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scan completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "If this job failed, verified secrets were found in the repository history." >> $GITHUB_STEP_SUMMARY
          echo "Review the job logs for details and rotate any exposed credentials immediately." >> $GITHUB_STEP_SUMMARY
