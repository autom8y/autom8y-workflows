# ==============================================================================
# Satellite CI - Reusable Workflow
# ==============================================================================
# Centralized CI for satellite repositories. Satellites call this with per-repo
# configuration inputs instead of duplicating ~200 lines of workflow YAML.
#
# Usage (in satellite's .github/workflows/test.yml):
#   jobs:
#     ci:
#       permissions:
#         id-token: write    # Required: OIDC for CodeArtifact
#         contents: read
#       uses: autom8y/autom8y-workflows/.github/workflows/satellite-ci-reusable.yml@main
#       with:
#         mypy_targets: 'src/autom8_asana'
#         coverage_package: 'autom8_asana'
#       secrets: inherit
#
# NOTE: The permissions block is REQUIRED. Without it, GitHub Actions inherits
# the org default (read-only), which blocks OIDC token generation and causes
# all jobs to fail with startup_failure (0 jobs created).

name: Satellite CI

# When this workflow is invoked from autom8y/sdk-publish-v2.yml's
# consumer-gate job, the dispatch_correlation_id input is set; we surface
# it in the run name so the consumer-gate's run-discovery loop (which
# scans recent workflow_dispatch runs for the bracketed UUID) finds the
# right run on the first or second poll.
run-name: >-
  ${{
    inputs.dispatch_correlation_id != ''
      && format('Satellite CI [candidate {0}@{1}] [{2}]', inputs.candidate_sdk_name, inputs.candidate_sdk_version, inputs.dispatch_correlation_id)
      || 'Satellite CI'
  }}

on:
  workflow_call:
    inputs:
      # --- Required: per-satellite configuration ---
      mypy_targets:
        description: 'Space-separated mypy target paths (e.g., "src/autom8_asana")'
        required: true
        type: string
      coverage_package:
        description: 'Package name for --cov (e.g., "autom8_asana" or "src/autom8y_ads")'
        required: true
        type: string

      # --- Optional: override defaults ---
      python_version:
        description: 'Python version'
        type: string
        default: '3.12'
      coverage_threshold:
        description: 'Minimum coverage percentage'
        type: number
        default: 80
      mypy_strict:
        description: 'Enable --strict mode for mypy'
        type: boolean
        default: true
      mypy_advisory_targets:
        description: 'Optional targets for advisory-only mypy (does not block CI)'
        type: string
        default: ''
      test_extras:
        description: 'uv sync arguments for extras (e.g., "--all-extras" or "--extra api --extra auth")'
        type: string
        default: '--all-extras'
      test_markers_exclude:
        description: 'pytest -m expression to EXCLUDE (e.g., "not integration and not benchmark")'
        type: string
        default: 'not integration'
      test_ignore:
        description: 'pytest --ignore paths (space-separated, e.g., "tests/benchmarks tests/integration")'
        type: string
        default: ''
      test_parallel:
        description: 'Enable pytest-xdist parallel execution (-n auto)'
        type: boolean
        default: false
      test_dist_strategy:
        description: 'pytest-xdist --dist strategy (e.g., "loadscope", "loadfile", "worksteal"). Empty = xdist default.'
        type: string
        default: ''
      test_maxprocesses:
        description: 'Cap pytest-xdist worker count when test_parallel=true (-n auto --maxprocesses=N). 0 = uncapped (default; -n auto unchanged). Set for memory-heavy suites that OOM the runner under -n auto.'
        type: number
        default: 0
      test_splits:
        description: 'Number of pytest-split matrix shards for the test job (1 = disable sharding, default: 1)'
        type: number
        default: 1
      test_durations_path:
        description: 'Path to pytest-split durations file (relative to repo root); only used when test_splits > 1'
        type: string
        default: '.test_durations'
      test_env:
        description: 'Extra env vars for test jobs as KEY=VALUE lines (newline-separated)'
        type: string
        default: ''
      run_integration:
        description: 'Run integration tests (typically true only on push to main)'
        type: boolean
        default: false
      integration_timeout:
        description: 'Integration test timeout in seconds'
        type: number
        default: 300
      semgrep_config:
        description: 'Semgrep config path (empty string to skip)'
        type: string
        default: ''
      convention_check:
        description: 'Run convention-check against spans emitted by instrumentation tests'
        type: boolean
        default: false
      convention_check_test_filter:
        description: 'pytest -k expression to select instrumentation tests for span collection (e.g., "instrumentation or telemetry")'
        type: string
        default: 'instrumentation or telemetry or otel'
      convention_check_test_env:
        description: 'Extra env vars for convention-check test run as KEY=VALUE lines (newline-separated)'
        type: string
        default: ''

      # --- Optional: Configspec / Secretspec validation ---
      run_configspec:
        description: 'Run configspec/secretspec validation (default: true if spec files exist)'
        required: false
        type: string
        default: 'true'

      # --- Optional: OpenAPI spec linting via Spectral ---
      spectral_enabled:
        description: 'Enable Spectral fleet ruleset validation for OpenAPI specs (opt-in)'
        type: boolean
        default: false
      openapi_spec_path:
        description: 'Path to the OpenAPI spec file (e.g., "docs/api-reference/openapi.json")'
        type: string
        default: ''

      # --- Optional: OpenAPI spec drift check ---
      spec_check_enabled:
        description: 'Enable OpenAPI spec drift check (runs generate_openapi.py --check)'
        type: boolean
        default: false
      spec_check_env:
        description: 'Env vars for spec-check as KEY=VALUE lines (e.g., "AUTOM8Y_ENV=test\nAUTH_DEV_MODE=true")'
        type: string
        default: ''
      spec_check_extras:
        description: 'uv sync arguments for spec-check job (e.g., "--extra api --extra analytics")'
        type: string
        default: '--all-extras'
      spec_check_validate_script:
        description: 'Optional post-generate validation script (e.g., "scripts/validate_openapi.py")'
        type: string
        default: ''

      # --- Optional: Semantic score regression gate ---
      semantic_score_enabled:
        description: 'Enable semantic score regression gate for OpenAPI specs'
        type: boolean
        default: false
      semantic_score_baseline:
        description: 'Path to baseline JSON for regression detection'
        type: string
        default: '.ci/semantic-baseline.json'

      # --- Optional: Fleet pyproject.toml conformance gate ---
      conformance_gate:
        description: 'Validate pyproject.toml against fleet conformance spec'
        type: boolean
        default: true

      # --- sdk-contract-governance Sprint 3: Consumer Validation Gate ---
      # When invoked from autom8y/sdk-publish-v2.yml's consumer-gate job, the
      # caller passes a candidate SDK wheel built from the publish-pipeline
      # commit. This reusable workflow downloads that wheel via the parent
      # workflow's run_id and force-reinstalls it BEFORE running tests so the
      # satellite's existing test suite executes against the candidate
      # behaviour, not the registry-pinned version. All four inputs are
      # required to be passed together; if any one is missing the candidate
      # path is skipped (normal CI continues unaffected).
      candidate_sdk_name:
        description: 'Distribution name of the candidate SDK (sdk-contract-governance Sprint 3)'
        type: string
        default: ''
      candidate_sdk_version:
        description: 'Candidate SDK version string for logging and the run name'
        type: string
        default: ''
      candidate_wheel_run_id:
        description: 'Workflow run ID that uploaded the candidate wheel artifact'
        type: string
        default: ''
      dispatch_correlation_id:
        description: 'Correlation UUID echoed into the job name so the gate can find this run'
        type: string
        default: ''

      # --- Optional: PR-mode-no-cov mechanism ---
      # Added 2026-05-01 for forward-path-2026-04-30 W3 phase-C decomposition
      # (autom8y-data Sprint 3). Default false: production callers byte-for-byte
      # identical. When true, omits --cov* flags from pytest invocation and
      # skips codecov upload — used by callers to strip coverage on PR runs
      # while preserving cov enforcement on push-to-main runs.
      pytest_disable_coverage:
        description: 'When true, omit --cov* flags so pytest_process_wall is uncontaminated by coverage instrumentation. Used by satellites to enable PR-mode-no-cov + push-mode-cov-on policy. Default false (production unchanged).'
        type: boolean
        default: false

      # --- Optional: Aggregate coverage gate (sharded callers) ---
      # When test_splits > 1, per-shard --cov-fail-under is meaningless (each
      # shard sees ~1/N of the package). Set coverage_threshold: 0 and wire
      # coverage_threshold_aggregate to the true threshold; the coverage-aggregate
      # job combines all shard .coverage files and enforces --fail-under on the
      # merged number. Default 0 = disabled (back-compat; no behaviour change for
      # callers that do not pass this input).
      coverage_threshold_aggregate:
        description: 'Aggregate coverage threshold for sharded runs. Only used when test_splits > 1. 0 = disabled (default). Set to the real threshold (e.g. 87) for satellites that shard their test suite.'
        type: number
        default: 0

      # --- Optional: Test job timeout ---
      test_timeout:
        description: 'Timeout in minutes for the test job (default: 20)'
        type: number
        default: 20

      # --- Optional: Runner tier (org-runner-tier-enablement-gated) ---
      runner_size:
        description: 'Runner tier: "standard" (ubuntu-latest, 2-vCPU) or "large" (ubuntu-latest-large, 8-vCPU; requires org-runner-tier enablement)'
        type: string
        default: 'standard'
        required: false

      # --- Optional: Contract/governance test support ---
      governance_repo_root:
        description: 'Path to checkout autom8y-api-schemas for contract/governance tests (relative to workspace)'
        type: string
        default: ''

      # --- R1-v3: event-class-invariant canonical checkout SHA ---
      autom8y_workflows_sha:
        description: 'SHA of autom8y-workflows at which the satellite pinned this reusable workflow. Passed as explicit input to bypass workflow_ref context-variable parsing (R1-v3 mechanism). Required; callers MUST pass github.sha.'
        required: true
        type: string

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          # Retry the token fetch (CodeArtifact connect-timeout flake class, FINDING-3):
          # a bare `aws codeartifact get-authorization-token` with no retry/timeouts
          # exits 255 on a connect-timeout and kills the job PRE-check (the PR #121
          # flake). 3 attempts × 5s backoff, with explicit CLI connect/read timeouts so
          # a stuck connection FAILS FAST into the retry instead of hanging. The `if`
          # guard (not `TOKEN=$(...)` bare) keeps the loop alive under `set -e`; a
          # final non-empty assertion HARD-FAILS so a genuinely unreachable
          # CodeArtifact still blocks (the retry hides transient flakes, not outages).
          TOKEN=""
          for attempt in 1 2 3; do
            if TOKEN=$(aws codeartifact get-authorization-token \
              --domain autom8y \
              --query authorizationToken \
              --output text \
              --cli-connect-timeout 15 \
              --cli-read-timeout 30) && [ -n "$TOKEN" ]; then
              break
            fi
            echo "::warning::CodeArtifact get-authorization-token attempt ${attempt}/3 failed (connect/read timeout or empty token) — retrying in 5s"
            TOKEN=""
            [ "$attempt" -lt 3 ] && sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::CodeArtifact get-authorization-token FAILED after 3 attempts — CodeArtifact unreachable or token empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.test_extras }}

      # sdk-contract-governance Sprint 3 + WS-alpha (2026-04-14): when invoked
      # by the consumer-gate the satellite must run its existing tests against
      # a CANDIDATE SDK wheel, not the registry version. We download the wheel
      # from the parent workflow run (autom8y/sdk-publish-v2.yml's
      # consumer-gate job) and force-reinstall it into the venv.
      #
      # Cross-repo artifact auth requirement: actions/download-artifact@v4
      # requires a token with actions:read on the SOURCE repo when
      # `repository:` is set to a different repo than the runner's
      # github.repository. The default GITHUB_TOKEN is scoped only to the
      # satellite repo (issuer of the workflow run) and cannot read artifacts
      # from autom8y/autom8y -- this manifests as "Not Found" (a
      # permission-denied masquerading as 404). We mint a short-lived
      # GitHub App installation token with owner:autom8y repositories:autom8y
      # so the App's actions:read permission on that install scope authorizes
      # the cross-repo download. The App (APP_ID/APP_PRIVATE_KEY) is
      # already used elsewhere in this reusable workflow (integration,
      # convention-check, contract-tests jobs).
      - name: Generate App token for cross-repo artifact download (consumer-gate)
        id: cross-repo-app-token
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y

      - name: Download candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0 (node24)
        with:
          name: consumer-gate-wheel-${{ inputs.candidate_sdk_name }}-${{ github.event.repository.name }}
          path: _candidate-wheel
          repository: autom8y/autom8y
          run-id: ${{ inputs.candidate_wheel_run_id }}
          github-token: ${{ steps.cross-repo-app-token.outputs.token }}

      - name: Force-install candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        run: |
          set -euo pipefail
          ls -la _candidate-wheel/
          CANDIDATE=$(find _candidate-wheel -name '*.whl' | head -n 1)
          if [ -z "$CANDIDATE" ]; then
            echo "::error::Consumer gate dispatched this run but no candidate wheel was found in the artifact"
            exit 1
          fi
          echo "Installing candidate wheel ${CANDIDATE}"
          # Pin every already-resolved transitive (from the coherent `uv sync` env
          # above) to its locked version so the candidate force-install cannot
          # partial-re-resolve a co-versioned family out of lockstep. Without this,
          # force-reinstalling the wheel can drag e.g. opentelemetry-sdk to latest
          # while leaving opentelemetry-api at the locked version -- an incoherent
          # pairing no real `uv lock` adoption ever yields. That skew surfaces as
          # `AttributeError: type object 'TraceFlags' has no attribute
          # 'RANDOM_TRACE_ID'` on every span-emitting test and false-fails the gate.
          # We exclude the candidate dist itself so the new version is still allowed
          # to replace the locked one. (Mirrors how a consumer actually adopts the
          # SDK: api+sdk co-resolve and stay coherent.)
          # Derive the candidate dist name from the wheel filename ($CANDIDATE is a
          # trusted shell var, not a templated workflow input) so no GitHub Actions
          # expression is interpolated into the shell (zizmor: code-injection-safe).
          CANDIDATE_PKG=$(basename "$CANDIDATE" | sed -E 's/-[0-9].*$//; s/_/-/g')
          # --all-extras is LOAD-BEARING: without it the export omits extras-only
          # subtrees (e.g. autom8y-auth lives in the data repo's [api] extra), so
          # the force-reinstall re-resolved that subtree UNCONSTRAINED and dragged
          # cryptography 46.0.5->48.0.1 + pyjwt 2.12.0->2.13.0 (2026-06-10 runs
          # 27292362248/27294677657 -- the consumer-gate shard-1 hang). stderr is
          # NOT discarded: a failed export must fail this step loudly, never
          # produce a silent partial constraints file.
          # --no-emit-workspace (not just --no-emit-project): a satellite with
          # local workspace members (e.g. autom8y-data's packages/autom8-dev-data)
          # otherwise exports them as bare file:// lines, which uv pip rejects as
          # "Unnamed requirements are not allowed as constraints" (data leg of
          # run 27409477576). Workspace members are local; constraints must pin
          # registry packages only.
          uv export --no-sources --no-emit-workspace --no-hashes --all-extras --format requirements-txt \
            | grep -ivE "^${CANDIDATE_PKG}(==| @|\[)" > _candidate-constraints.txt
          echo "candidate-constraints: $(wc -l < _candidate-constraints.txt) pinned requirements"
          uv pip install --no-sources --force-reinstall --constraint _candidate-constraints.txt "$CANDIDATE"

      - name: Check formatting
        run: uv run --no-sources ruff format . --check

      - name: Run linting
        run: uv run --no-sources ruff check .

      - name: Convention enforcement gate (BLE001/E722)
        run: |
          echo "Checking bare-except convention enforcement..."
          uv run --no-sources ruff check --select BLE001,E722 .

      - name: Type check (strict)
        run: uv run --no-sources mypy ${{ inputs.mypy_targets }} --ignore-missing-imports ${{ inputs.mypy_strict && '--strict' || '' }}

      - name: Type check (advisory)
        if: inputs.mypy_advisory_targets != ''
        run: uv run --no-sources mypy ${{ inputs.mypy_advisory_targets }} --ignore-missing-imports --strict || true

      - name: Semgrep (architecture enforcement)
        if: inputs.semgrep_config != ''
        run: uv tool run semgrep scan --config ${{ inputs.semgrep_config }} --error src/

      - name: Validate config spec
        if: inputs.run_configspec != 'false'
        run: |
          EXIT=0
          if [ -f "configspec.toml" ]; then
            echo "::group::configspec validation"
            uv run --no-sources python -m autom8y_config.specvalidator --configspec configspec.toml --verbose || EXIT=$?
            echo "::endgroup::"
          fi
          if [ -f "secretspec.toml" ]; then
            echo "::group::secretspec validation"
            uv run --no-sources python -m autom8y_config.specvalidator --secretspec secretspec.toml --check-naming --verbose || EXIT=$?
            echo "::endgroup::"
          fi
          if [ ! -f "configspec.toml" ] && [ ! -f "secretspec.toml" ]; then
            echo "No configspec.toml or secretspec.toml found — skipping spec validation"
          fi
          exit $EXIT

  # Sprint 2 (FR-1): Emits the matrix shard list for the `test` job. When
  # `test_splits <= 1` (the default for every satellite except autom8y-data at
  # the time of introduction), the list collapses to `[1]` and the `test` job
  # runs exactly once with identical behaviour to the pre-sharding design. When
  # `test_splits > 1`, `seq | jq` materializes a JSON integer array
  # (e.g. `[1,2,3,4]`) since GitHub Actions' expression language has no
  # `range()` primitive. Cost: one ~5-second prep job per invocation, amortized
  # over the shard speedup whenever sharding is active.
  matrix-prep:
    name: Matrix Prep
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 2
    outputs:
      shard_list: ${{ steps.build.outputs.shard_list }}
    steps:
      - name: Build shard list
        id: build
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
        run: |
          set -euo pipefail
          if [ "${TEST_SPLITS}" -le 1 ]; then
            LIST='[1]'
          else
            LIST=$(seq 1 "${TEST_SPLITS}" | jq -R 'tonumber' | jq -s -c .)
          fi
          echo "shard_list=${LIST}" >> "$GITHUB_OUTPUT"
          echo "Resolved shard list for test_splits=${TEST_SPLITS}: ${LIST}"

  test:
    needs: matrix-prep
    name: Test${{ inputs.test_splits > 1 && format(' (shard {0}/{1})', matrix.shard, inputs.test_splits) || '' }}
    runs-on: ${{ inputs.runner_size == 'large' && 'ubuntu-latest-large' || 'ubuntu-latest' }}
    timeout-minutes: ${{ inputs.test_timeout }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.matrix-prep.outputs.shard_list) }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - name: Generate App token for governance repo checkout
        id: governance-app-token
        if: inputs.governance_repo_root != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - name: Checkout governance repo (contract tests)
        if: inputs.governance_repo_root != ''
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          repository: autom8y/autom8y-api-schemas
          path: ${{ inputs.governance_repo_root }}
          token: ${{ steps.governance-app-token.outputs.token }}
          sparse-checkout: |
            .ledge/
            src/
            tests/contracts/
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Set GOVERNANCE_REPO_ROOT
        if: inputs.governance_repo_root != ''
        run: |
          echo "GOVERNANCE_REPO_ROOT=${{ github.workspace }}/${{ inputs.governance_repo_root }}" >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          # Retry the token fetch (CodeArtifact connect-timeout flake class, FINDING-3):
          # a bare `aws codeartifact get-authorization-token` with no retry/timeouts
          # exits 255 on a connect-timeout and kills the job PRE-check (the PR #121
          # flake). 3 attempts × 5s backoff, with explicit CLI connect/read timeouts so
          # a stuck connection FAILS FAST into the retry instead of hanging. The `if`
          # guard (not `TOKEN=$(...)` bare) keeps the loop alive under `set -e`; a
          # final non-empty assertion HARD-FAILS so a genuinely unreachable
          # CodeArtifact still blocks (the retry hides transient flakes, not outages).
          TOKEN=""
          for attempt in 1 2 3; do
            if TOKEN=$(aws codeartifact get-authorization-token \
              --domain autom8y \
              --query authorizationToken \
              --output text \
              --cli-connect-timeout 15 \
              --cli-read-timeout 30) && [ -n "$TOKEN" ]; then
              break
            fi
            echo "::warning::CodeArtifact get-authorization-token attempt ${attempt}/3 failed (connect/read timeout or empty token) — retrying in 5s"
            TOKEN=""
            [ "$attempt" -lt 3 ] && sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::CodeArtifact get-authorization-token FAILED after 3 attempts — CodeArtifact unreachable or token empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set test environment variables
        if: inputs.test_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.test_env }}
          input-name: test_env

      # --- D1 vendor-pin (HANDOFF H4): pinned mysql_scanner runner-setup ------
      # Make CI exercise the SAME pinned linux_amd64 mysql_scanner binary the
      # deploy image vendors, so MATERIALIZATION_MODE=attach drill tests cannot
      # silently fall back to the unpinned DuckDB REPOSITORY resolver (which
      # re-opens the SIGSEGV the D1 pin eradicates — autom8y-data ADR-D1).
      #
      # FLEET-SHARED NO-OP CONTRACT: every step below self-gates on the presence
      # of scripts/ci_fetch_pinned_mysql_scanner.sh in the CALLER repo. autom8y-data
      # ships that script (autom8y-data #100); no other satellite does, so for every
      # other caller hashFiles() returns '' and all of these steps are skipped — the
      # workflow is byte-for-byte unchanged in behavior for non-autom8y-data callers.
      # NO new workflow_call input is added.
      #
      # Fail-closed posture is LOAD-BEARING: a silent skip on autom8y-data would let
      # the helper fall back to the unpinned REPOSITORY resolver and re-open the
      # SIGSEGV. Every failure mode below fails the job (empty presign, fetch/auth
      # failure, sha256 mismatch, absent binary, cache-poison). The fail-closed
      # fetch asserts themselves live in the caller-owned script (curl -fSL + gunzip
      # + sha256 assert + place); H4 only presigns -> exports the two env vars ->
      # calls the script, and adds a cache-poison guard for the cache-HIT path.
      - name: Resolve DUCKDB_EXTENSION_DIRECTORY (D1 vendor-pin)
        if: hashFiles('scripts/ci_fetch_pinned_mysql_scanner.sh') != ''
        run: |
          set -euo pipefail
          DIR="${RUNNER_TEMP}/duckdb-extensions/v1.4.4/linux_amd64"
          mkdir -p "$DIR"
          echo "DUCKDB_EXTENSION_DIRECTORY=${DIR}" >> "$GITHUB_ENV"
          echo "D1: DUCKDB_EXTENSION_DIRECTORY=${DIR}"

      # NO restore-keys: a near-miss prefix restore is the silent-drift failure
      # mode (it would hydrate a DIFFERENT binary into the path, which the
      # cache-poison guard below would then reject — but we refuse the near-miss
      # outright so the miss path re-fetches the exact pinned asset).
      - name: Cache pinned mysql_scanner binary (D1 vendor-pin)
        id: cache-mysql-scanner
        if: hashFiles('scripts/ci_fetch_pinned_mysql_scanner.sh') != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 (node24)
        with:
          path: ${{ env.DUCKDB_EXTENSION_DIRECTORY }}
          key: duckdb-mysql-scanner-${{ runner.os }}-linux_amd64-v1.4.4-sha256-082d998e0cf2ddeb

      # On cache MISS only: presign the S3 object (mirrors monorepo #312
      # service-build.yml) and call the caller-owned fetch script, which env-guards,
      # curls -fSL, gunzips, sha256-asserts (default 082d998e...730e31) and places
      # $DUCKDB_EXTENSION_DIRECTORY/mysql_scanner.duckdb_extension.
      - name: Fetch pinned mysql_scanner on cache miss (D1 vendor-pin)
        if: hashFiles('scripts/ci_fetch_pinned_mysql_scanner.sh') != '' && steps.cache-mysql-scanner.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # The github-actions-deploy role (assumed above via OIDC) holds s3:GetObject
          # on the duckdb-extensions/v1.4.4/linux_amd64/* prefix (monorepo #312), so
          # the presigned URL it mints is itself fetchable by curl -fSL (presign
          # inherits the caller's perms).
          FETCH_URL=$(aws s3 presign \
            s3://autom8y-terraform/duckdb-extensions/v1.4.4/linux_amd64/mysql_scanner.duckdb_extension.gz \
            --expires-in 1800)
          echo "::add-mask::$FETCH_URL"
          # FAIL-CLOSED: an empty presign would make the fetch script's REQUIRED-env
          # guard the only thing standing between CI and the unpinned REPOSITORY
          # resolver. Refuse to proceed.
          if [ -z "${FETCH_URL}" ]; then
            echo "::error::aws s3 presign returned an empty URL for the D1 mysql_scanner asset; failing closed to avoid a silent non-vendored (REPOSITORY-fallback) drill run"
            exit 1
          fi
          export MYSQL_SCANNER_FETCH_URL="$FETCH_URL"
          bash scripts/ci_fetch_pinned_mysql_scanner.sh

      # Cache-poison guard — runs whenever the D1 gate is on (covers the cache-HIT
      # path, where the fetch script is skipped and never re-asserts the sha). If the
      # cached/fetched binary is absent or its sha256 drifts from the ADR-D1 pin, the
      # job fails closed rather than running drills against a wrong/unpinned binary.
      - name: Assert pinned mysql_scanner sha256 (D1 vendor-pin)
        if: hashFiles('scripts/ci_fetch_pinned_mysql_scanner.sh') != ''
        run: |
          set -euo pipefail
          EXPECTED="082d998e0cf2ddebf6a59cb1fb180b307ff4556c355b8da5afe483809b730e31"
          BIN="${DUCKDB_EXTENSION_DIRECTORY}/mysql_scanner.duckdb_extension"
          if [ ! -f "$BIN" ]; then
            echo "::error::D1 cache-poison guard: pinned binary absent at ${BIN}; refusing to run drills against the unpinned REPOSITORY resolver"
            exit 1
          fi
          COMPUTED="$(sha256sum "$BIN" | awk '{print $1}')"
          if [ "$COMPUTED" != "$EXPECTED" ]; then
            echo "::error::D1 cache-poison guard: sha256 mismatch for ${BIN}"
            echo "  expected: ${EXPECTED}"
            echo "  computed: ${COMPUTED}"
            exit 1
          fi
          echo "D1: pinned mysql_scanner sha256 verified (${EXPECTED}) at ${BIN}"
      # --- end D1 vendor-pin (HANDOFF H4) ------------------------------------

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.test_extras }}

      # sdk-contract-governance Sprint 3 + WS-alpha (2026-04-14):
      # see lint job for full rationale on the App-token auth path.
      - name: Generate App token for cross-repo artifact download (consumer-gate)
        id: cross-repo-app-token
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y

      - name: Download candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0 (node24)
        with:
          name: consumer-gate-wheel-${{ inputs.candidate_sdk_name }}-${{ github.event.repository.name }}
          path: _candidate-wheel
          repository: autom8y/autom8y
          run-id: ${{ inputs.candidate_wheel_run_id }}
          github-token: ${{ steps.cross-repo-app-token.outputs.token }}

      - name: Force-install candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        run: |
          set -euo pipefail
          ls -la _candidate-wheel/
          CANDIDATE=$(find _candidate-wheel -name '*.whl' | head -n 1)
          if [ -z "$CANDIDATE" ]; then
            echo "::error::Consumer gate dispatched this run but no candidate wheel was found in the artifact"
            exit 1
          fi
          echo "Installing candidate wheel ${CANDIDATE}"
          # Pin every already-resolved transitive (from the coherent `uv sync` env
          # above) to its locked version so the candidate force-install cannot
          # partial-re-resolve a co-versioned family out of lockstep. Without this,
          # force-reinstalling the wheel can drag e.g. opentelemetry-sdk to latest
          # while leaving opentelemetry-api at the locked version -- an incoherent
          # pairing no real `uv lock` adoption ever yields. That skew surfaces as
          # `AttributeError: type object 'TraceFlags' has no attribute
          # 'RANDOM_TRACE_ID'` on every span-emitting test and false-fails the gate.
          # We exclude the candidate dist itself so the new version is still allowed
          # to replace the locked one. (Mirrors how a consumer actually adopts the
          # SDK: api+sdk co-resolve and stay coherent.)
          # Derive the candidate dist name from the wheel filename ($CANDIDATE is a
          # trusted shell var, not a templated workflow input) so no GitHub Actions
          # expression is interpolated into the shell (zizmor: code-injection-safe).
          CANDIDATE_PKG=$(basename "$CANDIDATE" | sed -E 's/-[0-9].*$//; s/_/-/g')
          # --no-emit-workspace: see the lint-job block — local workspace members
          # export as bare file:// lines that uv pip rejects as constraints.
          # --all-extras: the 2026-06-10 shard-hang fix (see the lint-job block —
          # without it, extras-only subtrees like a satellite's [api] extra are
          # omitted, so the force-reinstall re-resolves them UNCONSTRAINED and
          # drags crypto/jwt out of lockstep) was applied only to the lint job;
          # this test-job export carried the same latent gap. stderr no longer
          # discarded: a failed export must fail loudly, never produce a silent
          # partial constraints file.
          uv export --no-sources --no-emit-workspace --no-hashes --all-extras --format requirements-txt \
            | grep -ivE "^${CANDIDATE_PKG}(==| @|\[)" > _candidate-constraints.txt
          echo "candidate-constraints: $(wc -l < _candidate-constraints.txt) pinned requirements"
          uv pip install --no-sources --force-reinstall --constraint _candidate-constraints.txt "$CANDIDATE"

      - name: Build pytest arguments
        id: pytest-args
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
          MATRIX_SHARD: ${{ matrix.shard }}
          TEST_DURATIONS_PATH: ${{ inputs.test_durations_path }}
          DISABLE_COV: ${{ inputs.pytest_disable_coverage }}
          COVERAGE_PACKAGE: ${{ inputs.coverage_package }}
          COVERAGE_THRESHOLD: ${{ inputs.coverage_threshold }}
          TEST_MAXPROCESSES: ${{ inputs.test_maxprocesses }}
        run: |
          ARGS="tests/"
          ARGS="$ARGS -m '${{ inputs.test_markers_exclude }}'"
          # PR-mode-no-cov mechanism: when pytest_disable_coverage=true, omit
          # all --cov* flags so pytest_process_wall is uncontaminated by
          # coverage instrumentation. Satellite callers wire conditional on
          # github.event_name == 'pull_request' to enable PR-mode-no-cov +
          # push-mode-cov-on policy (forward-path-2026-04-30 W3 phase-C).
          if [ "${DISABLE_COV}" = "true" ]; then
            ARGS="$ARGS -v --no-cov"
          else
            ARGS="$ARGS -v --cov=${COVERAGE_PACKAGE}"
            ARGS="$ARGS --cov-report=xml --cov-fail-under=${COVERAGE_THRESHOLD}"
          fi

          # Optional parallel execution
          if [ "${{ inputs.test_parallel }}" = "true" ]; then
            ARGS="$ARGS -n auto"
            # Optional worker cap for memory-heavy suites: -n auto picks one
            # worker per logical CPU, which can exceed runner RAM and OOM-kill
            # a worker. test_maxprocesses>0 bounds the worker count via xdist
            # --maxprocesses while keeping CPU-aware auto-detection. 0 = uncapped.
            if [ "${TEST_MAXPROCESSES}" -gt 0 ]; then
              ARGS="$ARGS --maxprocesses=${TEST_MAXPROCESSES}"
            fi
          fi

          # Optional xdist distribution strategy (only applied if non-empty)
          if [ -n "${{ inputs.test_dist_strategy }}" ]; then
            ARGS="$ARGS --dist=${{ inputs.test_dist_strategy }}"
          fi

          # Sprint 2 (FR-1): when test_splits > 1, partition the suite into
          # `test_splits` groups via pytest-split least_duration bin-packing,
          # and emit the trailing-tests duration table (FR-2, TDD §5.3) so the
          # "Run tests" step can tee it into .pytest-shard-durations.txt for
          # the durations artifact upload. When test_splits <= 1, no sharding
          # flags are emitted so the pre-sprint-2 command line is preserved
          # byte-for-byte.
          if [ "${TEST_SPLITS}" -gt 1 ]; then
            ARGS="$ARGS --splits=${TEST_SPLITS} --group=${MATRIX_SHARD}"
            ARGS="$ARGS --splitting-algorithm=least_duration"
            ARGS="$ARGS --durations-path=${TEST_DURATIONS_PATH}"
            ARGS="$ARGS --durations=0 --durations-min=0"
          fi

          # Optional --ignore paths
          IGNORE="${{ inputs.test_ignore }}"
          if [ -n "$IGNORE" ]; then
            for path in $IGNORE; do
              ARGS="$ARGS --ignore=$path"
            done
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT

      # When sharding is disabled (test_splits <= 1) this runs the exact same
      # command as before Sprint 2. When sharding is active, the pytest output
      # is tee'd to .pytest-shard-durations.txt so the trailing --durations=0
      # table can be published as a per-shard artifact (FR-2, TDD §5.3).
      # `set -o pipefail` ensures a pytest failure is not masked by tee's
      # exit 0.
      - name: Run tests with coverage
        shell: bash
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
        run: |
          set -o pipefail
          if [ "${TEST_SPLITS}" -gt 1 ]; then
            uv run --no-sources pytest ${{ steps.pytest-args.outputs.args }} 2>&1 | tee .pytest-shard-durations.txt
          else
            uv run --no-sources pytest ${{ steps.pytest-args.outputs.args }}
          fi

      # Aggregate coverage: upload the .coverage binary produced by this shard
      # so the coverage-aggregate job can combine all shards and enforce the
      # real --fail-under threshold on the merged number. Only uploaded when
      # sharding is active AND coverage_threshold_aggregate > 0 (opt-in).
      - name: Upload shard coverage data
        if: always() && inputs.test_splits > 1 && inputs.coverage_threshold_aggregate > 0 && inputs.pytest_disable_coverage != true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0 (node24)
        with:
          name: coverage-data-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: .coverage
          # .coverage is a dotfile; actions/upload-artifact >=v4.4 excludes hidden
          # files by default (GHSA-6q4m hidden-files change). Without this the
          # artifact uploads nothing ("No files were found with the provided path:
          # .coverage") and the coverage-aggregate job downloads 0 shards.
          include-hidden-files: true
          retention-days: 1
          # The aggregate gate depends on EVERY shard's data. A missing shard must
          # fail loudly here, not silently no-op into a lying-green gate.
          if-no-files-found: error

      # Sprint 2 (FR-2, NFR-2): publish per-shard pytest duration output so
      # downstream tooling (durations-refresh weekly job, QA trailing-10-run
      # review) can audit shard balance. Only uploaded when sharding is active
      # to avoid polluting artifact storage for unaffected satellites.
      - name: Upload shard durations
        if: always() && inputs.test_splits > 1
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0 (node24)
        with:
          name: pytest-durations-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: .pytest-shard-durations.txt
          include-hidden-files: true  # dotfile — see "Upload shard coverage data"
          retention-days: 14
          # `warn` (not `error`) is deliberate: durations are an advisory audit
          # artifact, not gate-blocking — unlike the coverage shard above.
          if-no-files-found: warn

      - name: Upload coverage
        if: inputs.pytest_disable_coverage != true
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  coverage-aggregate:
    name: Aggregate Coverage Gate
    # Only runs for sharded callers that opt into the aggregate threshold.
    # Default-off (coverage_threshold_aggregate: 0) — no existing caller breaks.
    if: inputs.test_splits > 1 && inputs.coverage_threshold_aggregate > 0 && inputs.pytest_disable_coverage != true
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      # `coverage report` re-parses each measured source file to count statements,
      # and the shard .coverage data records ABSOLUTE paths
      # (/home/runner/work/<repo>/<repo>/src/...). github.workspace is deterministic
      # per repo, so checking out the caller repo here places the source at exactly
      # those paths — without this, report fails with "No source for code".
      - name: Checkout (source needed for coverage report)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          # Pin to the SAME commit the shards measured, so coverage report re-parses
          # identical source — statement counts must line up with the recorded data.
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download all shard coverage data
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0 (node24)
        with:
          pattern: coverage-data-shard-*-${{ github.run_id }}
          # merge-multiple:false (default) is REQUIRED here: every shard uploads a
          # file literally named `.coverage`, so merging into one dir would collide
          # (last-wins) and only one shard's data would survive. Keeping each in its
          # own artifact subdir lets the recursive find below gather all of them.
          path: _shard-coverage

      - name: Install coverage tool
        # Major-pin: a coverage 8.x data-schema bump would make `combine` silently
        # drop the shards' v7 data (CoverageWarning, exit 0) and under-count.
        run: pip install --quiet "coverage>=7,<8"

      - name: Combine shard coverage files
        run: |
          set -euo pipefail
          echo "Coverage files found:"
          find _shard-coverage -name ".coverage*" | sort
          # mapfile avoids SC2046 word-splitting on paths
          mapfile -t COV_FILES < <(find _shard-coverage -name ".coverage*")
          if [ "${#COV_FILES[@]}" -eq 0 ]; then
            echo "::error::No shard .coverage data downloaded — the aggregate gate cannot run (check the shard upload step)."
            exit 1
          fi
          coverage combine --keep "${COV_FILES[@]}"
          # Fail closed if combine produced no usable data (all shards dropped by a
          # schema skew or corruption) — never enforce on an empty denominator.
          python -c "import coverage; d=coverage.CoverageData(); d.read(); n=len(d.measured_files()); print(f'combined measured files: {n}'); raise SystemExit(0 if n else 1)"

      - name: Enforce aggregate coverage threshold
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage_threshold_aggregate }}
        run: |
          set -euo pipefail
          echo "Aggregate coverage report (threshold: ${COVERAGE_THRESHOLD}%):"
          # No --include needed: the shard data is already scoped to the package via
          # each shard's --cov + [tool.coverage.run] source. The previous
          # --include="<pkg>/*" matched nothing against the absolute stored paths
          # ("No data to report"). The checked-out repo's pyproject supplies
          # [tool.coverage.report] (exclude_lines etc.).
          coverage report --fail-under="${COVERAGE_THRESHOLD}" | tee /tmp/coverage-report.txt
          echo "### Aggregate Coverage Gate PASS (${COVERAGE_THRESHOLD}% threshold)" >> "$GITHUB_STEP_SUMMARY"
          tail -3 /tmp/coverage-report.txt >> "$GITHUB_STEP_SUMMARY"

  integration:
    name: Integration Tests
    if: inputs.run_integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          # Retry the token fetch (CodeArtifact connect-timeout flake class, FINDING-3):
          # a bare `aws codeartifact get-authorization-token` with no retry/timeouts
          # exits 255 on a connect-timeout and kills the job PRE-check (the PR #121
          # flake). 3 attempts × 5s backoff, with explicit CLI connect/read timeouts so
          # a stuck connection FAILS FAST into the retry instead of hanging. The `if`
          # guard (not `TOKEN=$(...)` bare) keeps the loop alive under `set -e`; a
          # final non-empty assertion HARD-FAILS so a genuinely unreachable
          # CodeArtifact still blocks (the retry hides transient flakes, not outages).
          TOKEN=""
          for attempt in 1 2 3; do
            if TOKEN=$(aws codeartifact get-authorization-token \
              --domain autom8y \
              --query authorizationToken \
              --output text \
              --cli-connect-timeout 15 \
              --cli-read-timeout 30) && [ -n "$TOKEN" ]; then
              break
            fi
            echo "::warning::CodeArtifact get-authorization-token attempt ${attempt}/3 failed (connect/read timeout or empty token) — retrying in 5s"
            TOKEN=""
            [ "$attempt" -lt 3 ] && sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::CodeArtifact get-authorization-token FAILED after 3 attempts — CodeArtifact unreachable or token empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set test environment variables
        if: inputs.test_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.test_env }}
          input-name: test_env

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.test_extras }}

      - name: Run integration tests
        id: integration-tests
        run: uv run --no-sources pytest tests/ -m "integration" -v --timeout=${{ inputs.integration_timeout }}
        continue-on-error: true

      - name: Report integration test results
        if: always() && steps.integration-tests.outcome != 'skipped'
        run: |
          if [ "${{ steps.integration-tests.outcome }}" = "failure" ]; then
            echo "## :x: Integration Tests FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Integration tests failed on \`${{ github.repository }}\` @ \`${{ github.sha }}\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The job reports success because \`continue-on-error: true\` is set." >> $GITHUB_STEP_SUMMARY
            echo "Review the integration test logs above for failure details." >> $GITHUB_STEP_SUMMARY
            echo "::warning title=Integration Tests Failed::Integration tests failed but were marked advisory (continue-on-error). Review logs for details."
          else
            echo "## :white_check_mark: Integration Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi

  convention-check:
    name: Convention Check
    if: inputs.convention_check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          # Retry the token fetch (CodeArtifact connect-timeout flake class, FINDING-3):
          # a bare `aws codeartifact get-authorization-token` with no retry/timeouts
          # exits 255 on a connect-timeout and kills the job PRE-check (the PR #121
          # flake). 3 attempts × 5s backoff, with explicit CLI connect/read timeouts so
          # a stuck connection FAILS FAST into the retry instead of hanging. The `if`
          # guard (not `TOKEN=$(...)` bare) keeps the loop alive under `set -e`; a
          # final non-empty assertion HARD-FAILS so a genuinely unreachable
          # CodeArtifact still blocks (the retry hides transient flakes, not outages).
          TOKEN=""
          for attempt in 1 2 3; do
            if TOKEN=$(aws codeartifact get-authorization-token \
              --domain autom8y \
              --query authorizationToken \
              --output text \
              --cli-connect-timeout 15 \
              --cli-read-timeout 30) && [ -n "$TOKEN" ]; then
              break
            fi
            echo "::warning::CodeArtifact get-authorization-token attempt ${attempt}/3 failed (connect/read timeout or empty token) — retrying in 5s"
            TOKEN=""
            [ "$attempt" -lt 3 ] && sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::CodeArtifact get-authorization-token FAILED after 3 attempts — CodeArtifact unreachable or token empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set test environment variables
        if: inputs.convention_check_test_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.convention_check_test_env }}
          input-name: convention_check_test_env

      - name: Install dependencies
        run: uv sync --no-sources --all-extras

      - name: Create span collector plugin
        run: |
          cat > _conftest_convention_ci.py << 'CONFTEST_EOF'
          """CI-injected pytest plugin that collects spans from instrumentation tests.

          Patches InMemorySpanExporter to accumulate all spans created across the
          test session. At session end, dumps collected spans to spans.json for
          validation by convention-check CLI.

          This plugin is written inline by the CI job and is not checked in.
          """
          import json
          from pathlib import Path

          from opentelemetry.sdk.trace.export.in_memory_span_exporter import InMemorySpanExporter
          from autom8y_telemetry.conventions.checker import spans_to_json

          _all_exporters: list[InMemorySpanExporter] = []
          _orig_init = InMemorySpanExporter.__init__


          def _tracking_init(self, *args, **kwargs):
              _orig_init(self, *args, **kwargs)
              _all_exporters.append(self)


          InMemorySpanExporter.__init__ = _tracking_init


          def pytest_sessionfinish(session, exitstatus):
              """Collect spans from all InMemorySpanExporter instances and write to JSON."""
              all_spans = []
              for exporter in _all_exporters:
                  try:
                      all_spans.extend(exporter.get_finished_spans())
                  except Exception:
                      pass

              if all_spans:
                  Path("spans.json").write_text(spans_to_json(all_spans))
              else:
                  # Write empty spans file so convention-check has valid input
                  Path("spans.json").write_text(json.dumps({"spans": []}))
          CONFTEST_EOF

      - name: Collect spans from instrumentation tests
        env:
          PYTHONPATH: "."
        run: |
          uv run --no-sources pytest tests/ \
            -k '${{ inputs.convention_check_test_filter }}' \
            -p _conftest_convention_ci \
            --no-header -q \
            --tb=no \
            -m 'not integration' \
            || true
          if [ ! -f spans.json ]; then
            echo "::error::No spans.json produced -- convention collector plugin failed"
            exit 1
          fi
          SPAN_COUNT=$(uv run --no-sources python -c "import json; d=json.load(open('spans.json')); print(len(d.get('spans', [])))")
          echo "Collected $SPAN_COUNT spans"
          if [ "$SPAN_COUNT" -eq 0 ]; then
            echo "::warning::No spans collected. Check convention_check_test_filter matches instrumentation tests that use InMemorySpanExporter."
          fi

      - name: Run convention-check
        run: |
          uv run --no-sources convention-check --spans spans.json --format json > check_result.json || true
          DOMAIN_VIOLATIONS=$(python3 -c "
          import json
          data = json.load(open('check_result.json'))
          # Filter out framework spans (no dots in name = not domain spans)
          vs = [v for v in data.get('violations', [])
                if '.' in v.get('span_name', '')]
          print(len(vs))
          ")
          echo "Domain violations: $DOMAIN_VIOLATIONS (framework spans without dots filtered)"
          if [ "$DOMAIN_VIOLATIONS" -gt 0 ]; then
            echo "::error::Convention check found $DOMAIN_VIOLATIONS domain violations"
            uv run --no-sources convention-check --spans spans.json
            exit 1
          fi
          echo "Convention check passed (framework spans excluded from failure gate)"

  spectral-validation:
    name: Spectral Fleet Validation
    if: inputs.spectral_enabled
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - name: Fetch fleet ruleset
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          repository: autom8y/autom8y-api-schemas
          ref: main
          path: .fleet-schemas
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: |
            spectral-fleet.yaml
            spectral-functions/
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Install Spectral CLI
        # spectral-cli is version-pinned (6.15.0) but its @stoplight/spectral-*
        # transitives float. @stoplight/spectral-rulesets@1.22.3 (2026-05-21)
        # regressed and CRASHES ("Cannot read properties of null (reading 'enum')",
        # exit 2) on OpenAPI 3.1 specs via the ruleset's `extends: spectral:oas`.
        # `npm install -g` resolves the latest matching transitive each run, so
        # this broke every satellite deploy fleet-wide ~2026-05-21 with no code
        # change. Lock the last-good rulesets (1.22.2, 2026-05-12) via an
        # `overrides` package.json and install locally; the lint step resolves
        # `spectral` from node_modules/.bin (added to PATH). Bump the pin when a
        # fixed spectral-rulesets ships.
        run: |
          cat > package.json <<'JSON'
          {
            "name": "spectral-runner",
            "version": "1.0.0",
            "private": true,
            "dependencies": { "@stoplight/spectral-cli": "6.15.0" },
            "overrides": { "@stoplight/spectral-rulesets": "1.22.2" }
          }
          JSON
          npm install --no-audit --no-fund
          echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Lint OpenAPI spec
        run: |
          if [ ! -f "${{ inputs.openapi_spec_path }}" ]; then
            echo "::error::OpenAPI spec not found at ${{ inputs.openapi_spec_path }}"
            exit 1
          fi
          spectral lint "${{ inputs.openapi_spec_path }}" --ruleset .fleet-schemas/spectral-fleet.yaml --fail-severity=error

  spec-check:
    name: OpenAPI Spec Drift
    if: inputs.spec_check_enabled
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0 (node24)
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          # Retry the token fetch (CodeArtifact connect-timeout flake class, FINDING-3):
          # a bare `aws codeartifact get-authorization-token` with no retry/timeouts
          # exits 255 on a connect-timeout and kills the job PRE-check (the PR #121
          # flake). 3 attempts × 5s backoff, with explicit CLI connect/read timeouts so
          # a stuck connection FAILS FAST into the retry instead of hanging. The `if`
          # guard (not `TOKEN=$(...)` bare) keeps the loop alive under `set -e`; a
          # final non-empty assertion HARD-FAILS so a genuinely unreachable
          # CodeArtifact still blocks (the retry hides transient flakes, not outages).
          TOKEN=""
          for attempt in 1 2 3; do
            if TOKEN=$(aws codeartifact get-authorization-token \
              --domain autom8y \
              --query authorizationToken \
              --output text \
              --cli-connect-timeout 15 \
              --cli-read-timeout 30) && [ -n "$TOKEN" ]; then
              break
            fi
            echo "::warning::CodeArtifact get-authorization-token attempt ${attempt}/3 failed (connect/read timeout or empty token) — retrying in 5s"
            TOKEN=""
            [ "$attempt" -lt 3 ] && sleep 5
          done
          if [ -z "$TOKEN" ]; then
            echo "::error::CodeArtifact get-authorization-token FAILED after 3 attempts — CodeArtifact unreachable or token empty"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set spec-check environment variables
        if: inputs.spec_check_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.spec_check_env }}
          input-name: spec_check_env

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.spec_check_extras }}

      - name: Check OpenAPI spec drift
        run: uv run --no-sources python scripts/generate_openapi.py --check

      - name: Validate OpenAPI spec
        if: inputs.spec_check_validate_script != ''
        run: uv run --no-sources python ${{ inputs.spec_check_validate_script }}

  semantic-score:
    name: Semantic Score Gate
    if: inputs.semantic_score_enabled
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 (node24)
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: a8

      - name: Fetch canonical semantic-score
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          repository: autom8y/a8
          ref: main
          path: .tools-checkout
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: tools/semantic-score/score_spec.py
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - name: Run semantic score gate
        id: score
        run: |
          set -euo pipefail
          python .tools-checkout/tools/semantic-score/score_spec.py \
            ${{ inputs.openapi_spec_path }} \
            --baseline ${{ inputs.semantic_score_baseline }} \
            | tee /tmp/score-result.json

          COMPOSITE=$(python -c "import json; d=json.load(open('/tmp/score-result.json')); print(d['composite_score'])")
          SAFE=$(python -c "import json; d=json.load(open('/tmp/score-result.json')); print(d.get('regression_safe', True))")
          VIOLATIONS=$(python -c "import json; d=json.load(open('/tmp/score-result.json')); print(', '.join(d.get('floor_violations', [])) or 'none')")
          REGRESSIONS=$(python -c "import json; d=json.load(open('/tmp/score-result.json')); regs=d.get('regressions', []); print(', '.join(r['metric'] + ' (' + str(r['delta']) + ')' for r in regs) or 'none')")
          DELTA=$(python -c "import json; d=json.load(open('/tmp/score-result.json')); print(d.get('composite_delta', 'N/A'))")

          echo "composite=$COMPOSITE" >> "$GITHUB_OUTPUT"
          echo "regression_safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          echo "regressions=$REGRESSIONS" >> "$GITHUB_OUTPUT"
          echo "delta=$DELTA" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'
          ## Semantic Score Gate

          | Metric | Value |
          |--------|-------|
          HEADER

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          | Composite Score | ${{ steps.score.outputs.composite }} |
          | Composite Delta | ${{ steps.score.outputs.delta }} |
          | Regression Safe | ${{ steps.score.outputs.regression_safe }} |
          | Regressions | ${{ steps.score.outputs.regressions }} |
          | Floor Violations | ${{ steps.score.outputs.violations }} |
          EOF

          if [ "${{ steps.score.outputs.regression_safe }}" = "False" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> **BLOCKED**: Semantic regression detected. Fix the regressions above before merging." >> "$GITHUB_STEP_SUMMARY"
          fi

  conformance-gate:
    name: Fleet Conformance Gate
    if: inputs.conformance_gate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0 (node24)
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install PyYAML
        run: pip install pyyaml

      # R1 canonical-source-integrity: check out autom8y-workflows at the SHA
      # the caller pinned (parsed from github.workflow_ref), then invoke the
      # fleet-conformance gate action and spec from that canonical checkout.
      # This eliminates the vendored-replica drift vector where satellites'
      # local .github/actions/fleet-conformance-gate/ and
      # fleet-conformance-spec.yml could diverge from the canonical source at
      # autom8y-workflows.
      # Reference: ADR-ANCHOR-001 (merged PR autom8y#159); PT-EXEC adjudication
      # STAGE-EXEC Phase R1-1 Gate R1-1b; R1a-fix PT-EXEC Phase R1-3.
      #
      # R1a-fix: github.action_ref resolves in step-context to the current
      # action's own ref (actions/checkout v4 SHA), not the caller's
      # reusable-workflow pin. In reusable-workflow context, the caller pin
      # is exposed as github.workflow_ref with the form
      # "owner/repo/.github/workflows/filename.yml@<SHA>". Parse the SHA
      # after "@" — this is the caller-pinned SHA that pins BOTH the
      # reusable workflow AND the canonical action+spec checkout per R1a
      # canonical-at-caller-pin invariant. Empirical defect evidence:
      # FCG run 24866314031 job 72803017772 (Step 5 "Checkout
      # fleet-conformance canonical" conclusion=failure because
      # github.action_ref resolved to an actions/checkout SHA, not the
      # autom8y-workflows caller pin).
      - name: Checkout fleet-conformance canonical (autom8y-workflows)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          repository: autom8y/autom8y-workflows
          ref: ${{ inputs.autom8y_workflows_sha }}
          path: .fleet-conformance-canonical
          persist-credentials: false

      - name: Run conformance gate (from canonical checkout)
        uses: ./.fleet-conformance-canonical/.github/actions/fleet-conformance-gate
        with:
          repo-name: ${{ github.event.repository.name }}
          spec-path: ${{ github.workspace }}/.fleet-conformance-canonical/fleet-conformance-spec.yml
