# ==============================================================================
# Satellite CI - Reusable Workflow
# ==============================================================================
# Centralized CI for satellite repositories. Satellites call this with per-repo
# configuration inputs instead of duplicating ~200 lines of workflow YAML.
#
# Usage (in satellite's .github/workflows/test.yml):
#   jobs:
#     ci:
#       permissions:
#         id-token: write    # Required: OIDC for CodeArtifact
#         contents: read
#       uses: autom8y/autom8y-workflows/.github/workflows/satellite-ci-reusable.yml@main
#       with:
#         mypy_targets: 'src/autom8_asana'
#         coverage_package: 'autom8_asana'
#       secrets: inherit
#
# NOTE: The permissions block is REQUIRED. Without it, GitHub Actions inherits
# the org default (read-only), which blocks OIDC token generation and causes
# all jobs to fail with startup_failure (0 jobs created).

name: Satellite CI

# When this workflow is invoked from autom8y/sdk-publish-v2.yml's
# consumer-gate job, the dispatch_correlation_id input is set; we surface
# it in the run name so the consumer-gate's run-discovery loop (which
# scans recent workflow_dispatch runs for the bracketed UUID) finds the
# right run on the first or second poll.
run-name: >-
  ${{
    inputs.dispatch_correlation_id != ''
      && format('Satellite CI [candidate {0}@{1}] [{2}]', inputs.candidate_sdk_name, inputs.candidate_sdk_version, inputs.dispatch_correlation_id)
      || 'Satellite CI'
  }}

on:
  workflow_call:
    inputs:
      # --- Required: per-satellite configuration ---
      mypy_targets:
        description: 'Space-separated mypy target paths (e.g., "src/autom8_asana")'
        required: true
        type: string
      coverage_package:
        description: 'Package name for --cov (e.g., "autom8_asana" or "src/autom8y_ads")'
        required: true
        type: string

      # --- Optional: override defaults ---
      python_version:
        description: 'Python version'
        type: string
        default: '3.12'
      coverage_threshold:
        description: 'Minimum coverage percentage'
        type: number
        default: 80
      mypy_strict:
        description: 'Enable --strict mode for mypy'
        type: boolean
        default: true
      mypy_advisory_targets:
        description: 'Optional targets for advisory-only mypy (does not block CI)'
        type: string
        default: ''
      test_extras:
        description: 'uv sync arguments for extras (e.g., "--all-extras" or "--extra api --extra auth")'
        type: string
        default: '--all-extras'
      test_markers_exclude:
        description: 'pytest -m expression to EXCLUDE (e.g., "not integration and not benchmark")'
        type: string
        default: 'not integration'
      test_ignore:
        description: 'pytest --ignore paths (space-separated, e.g., "tests/benchmarks tests/integration")'
        type: string
        default: ''
      test_parallel:
        description: 'Enable pytest-xdist parallel execution (-n auto)'
        type: boolean
        default: false
      test_dist_strategy:
        description: 'pytest-xdist --dist strategy (e.g., "loadscope", "loadfile", "worksteal"). Empty = xdist default.'
        type: string
        default: ''
      test_splits:
        description: 'Number of pytest-split matrix shards for the test job (1 = disable sharding, default: 1)'
        type: number
        default: 1
      test_durations_path:
        description: 'Path to pytest-split durations file (relative to repo root); only used when test_splits > 1'
        type: string
        default: '.test_durations'
      test_env:
        description: 'Extra env vars for test jobs as KEY=VALUE lines (newline-separated)'
        type: string
        default: ''
      run_integration:
        description: 'Run integration tests (typically true only on push to main)'
        type: boolean
        default: false
      integration_timeout:
        description: 'Integration test timeout in seconds'
        type: number
        default: 300
      semgrep_config:
        description: 'Semgrep config path (empty string to skip)'
        type: string
        default: ''
      convention_check:
        description: 'Run convention-check against spans emitted by instrumentation tests'
        type: boolean
        default: false
      convention_check_test_filter:
        description: 'pytest -k expression to select instrumentation tests for span collection (e.g., "instrumentation or telemetry")'
        type: string
        default: 'instrumentation or telemetry or otel'
      convention_check_test_env:
        description: 'Extra env vars for convention-check test run as KEY=VALUE lines (newline-separated)'
        type: string
        default: ''

      # --- Optional: Configspec / Secretspec validation ---
      run_configspec:
        description: 'Run configspec/secretspec validation (default: true if spec files exist)'
        required: false
        type: string
        default: 'true'

      # --- Optional: OpenAPI spec linting via Spectral ---
      spectral_enabled:
        description: 'Enable Spectral fleet ruleset validation for OpenAPI specs (opt-in)'
        type: boolean
        default: false
      openapi_spec_path:
        description: 'Path to the OpenAPI spec file (e.g., "docs/api-reference/openapi.json")'
        type: string
        default: ''

      # --- Optional: OpenAPI spec drift check ---
      spec_check_enabled:
        description: 'Enable OpenAPI spec drift check (runs generate_openapi.py --check)'
        type: boolean
        default: false
      spec_check_env:
        description: 'Env vars for spec-check as KEY=VALUE lines (e.g., "AUTOM8Y_ENV=test\nAUTH_DEV_MODE=true")'
        type: string
        default: ''
      spec_check_extras:
        description: 'uv sync arguments for spec-check job (e.g., "--extra api --extra analytics")'
        type: string
        default: '--all-extras'
      spec_check_validate_script:
        description: 'Optional post-generate validation script (e.g., "scripts/validate_openapi.py")'
        type: string
        default: ''

      # --- Optional: Semantic score regression gate ---
      semantic_score_enabled:
        description: 'Enable semantic score regression gate for OpenAPI specs'
        type: boolean
        default: false
      semantic_score_baseline:
        description: 'Path to baseline JSON for regression detection'
        type: string
        default: '.ci/semantic-baseline.json'

      # --- Optional: Fleet pyproject.toml conformance gate ---
      conformance_gate:
        description: 'Validate pyproject.toml against fleet conformance spec'
        type: boolean
        default: true

      # --- sdk-contract-governance Sprint 3: Consumer Validation Gate ---
      # When invoked from autom8y/sdk-publish-v2.yml's consumer-gate job, the
      # caller passes a candidate SDK wheel built from the publish-pipeline
      # commit. This reusable workflow downloads that wheel via the parent
      # workflow's run_id and force-reinstalls it BEFORE running tests so the
      # satellite's existing test suite executes against the candidate
      # behaviour, not the registry-pinned version. All four inputs are
      # required to be passed together; if any one is missing the candidate
      # path is skipped (normal CI continues unaffected).
      candidate_sdk_name:
        description: 'Distribution name of the candidate SDK (sdk-contract-governance Sprint 3)'
        type: string
        default: ''
      candidate_sdk_version:
        description: 'Candidate SDK version string for logging and the run name'
        type: string
        default: ''
      candidate_wheel_run_id:
        description: 'Workflow run ID that uploaded the candidate wheel artifact'
        type: string
        default: ''
      dispatch_correlation_id:
        description: 'Correlation UUID echoed into the job name so the gate can find this run'
        type: string
        default: ''

      # --- Optional: Test job timeout ---
      test_timeout:
        description: 'Timeout in minutes for the test job (default: 20)'
        type: number
        default: 20

      # --- Optional: Contract/governance test support ---
      governance_repo_root:
        description: 'Path to checkout autom8y-api-schemas for contract/governance tests (relative to workspace)'
        type: string
        default: ''

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.test_extras }}

      # sdk-contract-governance Sprint 3 + WS-alpha (2026-04-14): when invoked
      # by the consumer-gate the satellite must run its existing tests against
      # a CANDIDATE SDK wheel, not the registry version. We download the wheel
      # from the parent workflow run (autom8y/sdk-publish-v2.yml's
      # consumer-gate job) and force-reinstall it into the venv.
      #
      # Cross-repo artifact auth requirement: actions/download-artifact@v4
      # requires a token with actions:read on the SOURCE repo when
      # `repository:` is set to a different repo than the runner's
      # github.repository. The default GITHUB_TOKEN is scoped only to the
      # satellite repo (issuer of the workflow run) and cannot read artifacts
      # from autom8y/autom8y -- this manifests as "Not Found" (a
      # permission-denied masquerading as 404). We mint a short-lived
      # GitHub App installation token with owner:autom8y repositories:autom8y
      # so the App's actions:read permission on that install scope authorizes
      # the cross-repo download. The App (APP_ID/APP_PRIVATE_KEY) is
      # already used elsewhere in this reusable workflow (integration,
      # convention-check, contract-tests jobs).
      - name: Generate App token for cross-repo artifact download (consumer-gate)
        id: cross-repo-app-token
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y

      - name: Download candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: consumer-gate-wheel-${{ inputs.candidate_sdk_name }}-${{ github.event.repository.name }}
          path: _candidate-wheel
          repository: autom8y/autom8y
          run-id: ${{ inputs.candidate_wheel_run_id }}
          github-token: ${{ steps.cross-repo-app-token.outputs.token }}

      - name: Force-install candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        run: |
          set -euo pipefail
          ls -la _candidate-wheel/
          CANDIDATE=$(find _candidate-wheel -name '*.whl' | head -n 1)
          if [ -z "$CANDIDATE" ]; then
            echo "::error::Consumer gate dispatched this run but no candidate wheel was found in the artifact"
            exit 1
          fi
          echo "Installing candidate ${CANDIDATE} for ${{ inputs.candidate_sdk_name }}@${{ inputs.candidate_sdk_version }}"
          uv pip install --no-sources --force-reinstall "$CANDIDATE"

      - name: Check formatting
        run: uv run --no-sources ruff format . --check

      - name: Run linting
        run: uv run --no-sources ruff check .

      - name: Convention enforcement gate (BLE001/E722)
        run: |
          echo "Checking bare-except convention enforcement..."
          uv run --no-sources ruff check --select BLE001,E722 .

      - name: Type check (strict)
        run: uv run --no-sources mypy ${{ inputs.mypy_targets }} --ignore-missing-imports ${{ inputs.mypy_strict && '--strict' || '' }}

      - name: Type check (advisory)
        if: inputs.mypy_advisory_targets != ''
        run: uv run --no-sources mypy ${{ inputs.mypy_advisory_targets }} --ignore-missing-imports --strict || true

      - name: Semgrep (architecture enforcement)
        if: inputs.semgrep_config != ''
        run: uv tool run semgrep scan --config ${{ inputs.semgrep_config }} --error src/

      - name: Validate config spec
        if: inputs.run_configspec != 'false'
        run: |
          EXIT=0
          if [ -f "configspec.toml" ]; then
            echo "::group::configspec validation"
            uv run --no-sources python -m autom8y_config.specvalidator --configspec configspec.toml --verbose || EXIT=$?
            echo "::endgroup::"
          fi
          if [ -f "secretspec.toml" ]; then
            echo "::group::secretspec validation"
            uv run --no-sources python -m autom8y_config.specvalidator --secretspec secretspec.toml --check-naming --verbose || EXIT=$?
            echo "::endgroup::"
          fi
          if [ ! -f "configspec.toml" ] && [ ! -f "secretspec.toml" ]; then
            echo "No configspec.toml or secretspec.toml found — skipping spec validation"
          fi
          exit $EXIT

  # Sprint 2 (FR-1): Emits the matrix shard list for the `test` job. When
  # `test_splits <= 1` (the default for every satellite except autom8y-data at
  # the time of introduction), the list collapses to `[1]` and the `test` job
  # runs exactly once with identical behaviour to the pre-sharding design. When
  # `test_splits > 1`, `seq | jq` materializes a JSON integer array
  # (e.g. `[1,2,3,4]`) since GitHub Actions' expression language has no
  # `range()` primitive. Cost: one ~5-second prep job per invocation, amortized
  # over the shard speedup whenever sharding is active.
  matrix-prep:
    name: Matrix Prep
    runs-on: ubuntu-latest
    permissions: {}
    timeout-minutes: 2
    outputs:
      shard_list: ${{ steps.build.outputs.shard_list }}
    steps:
      - name: Build shard list
        id: build
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
        run: |
          set -euo pipefail
          if [ "${TEST_SPLITS}" -le 1 ]; then
            LIST='[1]'
          else
            LIST=$(seq 1 "${TEST_SPLITS}" | jq -R 'tonumber' | jq -s -c .)
          fi
          echo "shard_list=${LIST}" >> "$GITHUB_OUTPUT"
          echo "Resolved shard list for test_splits=${TEST_SPLITS}: ${LIST}"

  test:
    needs: matrix-prep
    name: Test${{ inputs.test_splits > 1 && format(' (shard {0}/{1})', matrix.shard, inputs.test_splits) || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.test_timeout }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.matrix-prep.outputs.shard_list) }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Generate App token for governance repo checkout
        id: governance-app-token
        if: inputs.governance_repo_root != ''
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - name: Checkout governance repo (contract tests)
        if: inputs.governance_repo_root != ''
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: autom8y/autom8y-api-schemas
          path: ${{ inputs.governance_repo_root }}
          token: ${{ steps.governance-app-token.outputs.token }}
          sparse-checkout: |
            .ledge/
            src/
            tests/contracts/
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Set GOVERNANCE_REPO_ROOT
        if: inputs.governance_repo_root != ''
        run: |
          echo "GOVERNANCE_REPO_ROOT=${{ github.workspace }}/${{ inputs.governance_repo_root }}" >> $GITHUB_ENV

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set test environment variables
        if: inputs.test_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.test_env }}
          input-name: test_env

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.test_extras }}

      # sdk-contract-governance Sprint 3 + WS-alpha (2026-04-14):
      # see lint job for full rationale on the App-token auth path.
      - name: Generate App token for cross-repo artifact download (consumer-gate)
        id: cross-repo-app-token
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y

      - name: Download candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: consumer-gate-wheel-${{ inputs.candidate_sdk_name }}-${{ github.event.repository.name }}
          path: _candidate-wheel
          repository: autom8y/autom8y
          run-id: ${{ inputs.candidate_wheel_run_id }}
          github-token: ${{ steps.cross-repo-app-token.outputs.token }}

      - name: Force-install candidate SDK wheel (consumer-gate)
        if: inputs.candidate_wheel_run_id != '' && inputs.candidate_sdk_name != ''
        run: |
          set -euo pipefail
          ls -la _candidate-wheel/
          CANDIDATE=$(find _candidate-wheel -name '*.whl' | head -n 1)
          if [ -z "$CANDIDATE" ]; then
            echo "::error::Consumer gate dispatched this run but no candidate wheel was found in the artifact"
            exit 1
          fi
          echo "Installing candidate ${CANDIDATE} for ${{ inputs.candidate_sdk_name }}@${{ inputs.candidate_sdk_version }}"
          uv pip install --no-sources --force-reinstall "$CANDIDATE"

      - name: Build pytest arguments
        id: pytest-args
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
          MATRIX_SHARD: ${{ matrix.shard }}
          TEST_DURATIONS_PATH: ${{ inputs.test_durations_path }}
        run: |
          ARGS="tests/"
          ARGS="$ARGS -m '${{ inputs.test_markers_exclude }}'"
          ARGS="$ARGS -v --cov=${{ inputs.coverage_package }}"
          ARGS="$ARGS --cov-report=xml --cov-fail-under=${{ inputs.coverage_threshold }}"

          # Optional parallel execution
          if [ "${{ inputs.test_parallel }}" = "true" ]; then
            ARGS="$ARGS -n auto"
          fi

          # Optional xdist distribution strategy (only applied if non-empty)
          if [ -n "${{ inputs.test_dist_strategy }}" ]; then
            ARGS="$ARGS --dist=${{ inputs.test_dist_strategy }}"
          fi

          # Sprint 2 (FR-1): when test_splits > 1, partition the suite into
          # `test_splits` groups via pytest-split least_duration bin-packing,
          # and emit the trailing-tests duration table (FR-2, TDD §5.3) so the
          # "Run tests" step can tee it into .pytest-shard-durations.txt for
          # the durations artifact upload. When test_splits <= 1, no sharding
          # flags are emitted so the pre-sprint-2 command line is preserved
          # byte-for-byte.
          if [ "${TEST_SPLITS}" -gt 1 ]; then
            ARGS="$ARGS --splits=${TEST_SPLITS} --group=${MATRIX_SHARD}"
            ARGS="$ARGS --splitting-algorithm=least_duration"
            ARGS="$ARGS --durations-path=${TEST_DURATIONS_PATH}"
            ARGS="$ARGS --durations=0 --durations-min=0"
          fi

          # Optional --ignore paths
          IGNORE="${{ inputs.test_ignore }}"
          if [ -n "$IGNORE" ]; then
            for path in $IGNORE; do
              ARGS="$ARGS --ignore=$path"
            done
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT

      # When sharding is disabled (test_splits <= 1) this runs the exact same
      # command as before Sprint 2. When sharding is active, the pytest output
      # is tee'd to .pytest-shard-durations.txt so the trailing --durations=0
      # table can be published as a per-shard artifact (FR-2, TDD §5.3).
      # `set -o pipefail` ensures a pytest failure is not masked by tee's
      # exit 0.
      - name: Run tests with coverage
        shell: bash
        env:
          TEST_SPLITS: ${{ inputs.test_splits }}
        run: |
          set -o pipefail
          if [ "${TEST_SPLITS}" -gt 1 ]; then
            uv run --no-sources pytest ${{ steps.pytest-args.outputs.args }} 2>&1 | tee .pytest-shard-durations.txt
          else
            uv run --no-sources pytest ${{ steps.pytest-args.outputs.args }}
          fi

      # Sprint 2 (FR-2, NFR-2): publish per-shard pytest duration output so
      # downstream tooling (durations-refresh weekly job, QA trailing-10-run
      # review) can audit shard balance. Only uploaded when sharding is active
      # to avoid polluting artifact storage for unaffected satellites.
      - name: Upload shard durations
        if: always() && inputs.test_splits > 1
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-durations-shard-${{ matrix.shard }}-${{ github.run_id }}
          path: .pytest-shard-durations.txt
          retention-days: 14
          if-no-files-found: warn

      - name: Upload coverage
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration Tests
    if: inputs.run_integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set test environment variables
        if: inputs.test_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.test_env }}
          input-name: test_env

      - name: Install dependencies
        run: uv sync --no-sources ${{ inputs.test_extras }}

      - name: Run integration tests
        id: integration-tests
        run: uv run --no-sources pytest tests/ -m "integration" -v --timeout=${{ inputs.integration_timeout }}
        continue-on-error: true

      - name: Report integration test results
        if: always() && steps.integration-tests.outcome != 'skipped'
        run: |
          if [ "${{ steps.integration-tests.outcome }}" = "failure" ]; then
            echo "## :x: Integration Tests FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Integration tests failed on \`${{ github.repository }}\` @ \`${{ github.sha }}\`." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The job reports success because \`continue-on-error: true\` is set." >> $GITHUB_STEP_SUMMARY
            echo "Review the integration test logs above for failure details." >> $GITHUB_STEP_SUMMARY
            echo "::warning title=Integration Tests Failed::Integration tests failed but were marked advisory (continue-on-error). Review logs for details."
          else
            echo "## :white_check_mark: Integration Tests Passed" >> $GITHUB_STEP_SUMMARY
          fi

  convention-check:
    name: Convention Check
    if: inputs.convention_check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "0.10.8"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Get CodeArtifact auth token
        id: codeartifact
        run: |
          TOKEN=$(aws codeartifact get-authorization-token \
            --domain autom8y \
            --query authorizationToken \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure uv for CodeArtifact
        run: |
          echo "UV_INDEX_AUTOM8Y_USERNAME=aws" >> $GITHUB_ENV
          echo "UV_INDEX_AUTOM8Y_PASSWORD=${{ steps.codeartifact.outputs.token }}" >> $GITHUB_ENV

      - name: Set test environment variables
        if: inputs.convention_check_test_env != ''
        uses: ./.github/actions/validate-env-injection
        with:
          env-pairs: ${{ inputs.convention_check_test_env }}
          input-name: convention_check_test_env

      - name: Install dependencies
        run: uv sync --no-sources --all-extras

      - name: Create span collector plugin
        run: |
          cat > _conftest_convention_ci.py << 'CONFTEST_EOF'
          """CI-injected pytest plugin that collects spans from instrumentation tests.

          Patches InMemorySpanExporter to accumulate all spans created across the
          test session. At session end, dumps collected spans to spans.json for
          validation by convention-check CLI.

          This plugin is written inline by the CI job and is not checked in.
          """
          import json
          from pathlib import Path

          from opentelemetry.sdk.trace.export.in_memory_span_exporter import InMemorySpanExporter
          from autom8y_telemetry.conventions.checker import spans_to_json

          _all_exporters: list[InMemorySpanExporter] = []
          _orig_init = InMemorySpanExporter.__init__


          def _tracking_init(self, *args, **kwargs):
              _orig_init(self, *args, **kwargs)
              _all_exporters.append(self)


          InMemorySpanExporter.__init__ = _tracking_init


          def pytest_sessionfinish(session, exitstatus):
              """Collect spans from all InMemorySpanExporter instances and write to JSON."""
              all_spans = []
              for exporter in _all_exporters:
                  try:
                      all_spans.extend(exporter.get_finished_spans())
                  except Exception:
                      pass

              if all_spans:
                  Path("spans.json").write_text(spans_to_json(all_spans))
              else:
                  # Write empty spans file so convention-check has valid input
                  Path("spans.json").write_text(json.dumps({"spans": []}))
          CONFTEST_EOF

      - name: Collect spans from instrumentation tests
        env:
          PYTHONPATH: "."
        run: |
          uv run --no-sources pytest tests/ \
            -k '${{ inputs.convention_check_test_filter }}' \
            -p _conftest_convention_ci \
            --no-header -q \
            --tb=no \
            -m 'not integration' \
            || true
          if [ ! -f spans.json ]; then
            echo "::error::No spans.json produced -- convention collector plugin failed"
            exit 1
          fi
          SPAN_COUNT=$(uv run --no-sources python -c "import json; d=json.load(open('spans.json')); print(len(d.get('spans', [])))")
          echo "Collected $SPAN_COUNT spans"
          if [ "$SPAN_COUNT" -eq 0 ]; then
            echo "::warning::No spans collected. Check convention_check_test_filter matches instrumentation tests that use InMemorySpanExporter."
          fi

      - name: Run convention-check
        run: |
          uv run --no-sources convention-check --spans spans.json --format json > check_result.json || true
          DOMAIN_VIOLATIONS=$(python3 -c "
          import json
          data = json.load(open('check_result.json'))
          # Filter out framework spans (no dots in name = not domain spans)
          vs = [v for v in data.get('violations', [])
                if '.' in v.get('span_name', '')]
          print(len(vs))
          ")
          echo "Domain violations: $DOMAIN_VIOLATIONS (framework spans without dots filtered)"
          if [ "$DOMAIN_VIOLATIONS" -gt 0 ]; then
            echo "::error::Convention check found $DOMAIN_VIOLATIONS domain violations"
            uv run --no-sources convention-check --spans spans.json
            exit 1
          fi
          echo "Convention check passed (framework spans excluded from failure gate)"

  spectral-validation:
    name: Spectral Fleet Validation
    if: inputs.spectral_enabled
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: autom8y
          repositories: autom8y-api-schemas

      - name: Fetch fleet ruleset
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: autom8y/autom8y-api-schemas
          ref: main
          path: .fleet-schemas
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: |
            spectral-fleet.yaml
            spectral-functions/
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Install Spectral CLI
        run: npm install -g @stoplight/spectral-cli@6.15.0

      - name: Lint OpenAPI spec
        run: |
          if [ ! -f "${{ inputs.openapi_spec_path }}" ]; then
            echo "::error::OpenAPI spec not found at ${{ inputs.openapi_spec_path }}"
            exit 1
          fi
          spectral lint "${{ inputs.openapi_spec_path }}" --ruleset .fleet-schemas/spectral-fleet.yaml --fail-severity=error

