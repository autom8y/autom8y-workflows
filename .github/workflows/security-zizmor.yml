name: "Security: zizmor Actions Audit"

on:
  workflow_call:

jobs:
  zizmor:
    name: Actions Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1 (node24)
        with:
          persist-credentials: false

      - name: Install zizmor
        run: pip install zizmor==1.23.1

      - name: Run zizmor
        run: zizmor --format sarif . > zizmor-results.sarif || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3
        if: always() && github.event.repository.visibility == 'public'
        continue-on-error: true
        with:
          sarif_file: zizmor-results.sarif
          category: zizmor
