name: OpenSSF Scorecard

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

# NOTE: No workflow-level permissions. The scorecard webapp rejects
# workflow-level write permissions. All permissions are at job level.

jobs:
  scorecard:
    permissions:
      id-token: write
      security-events: write
      contents: read
      actions: read
      issues: read
      pull-requests: read
      checks: read
    # Local reference (same-repo) -- consistent with dependency-review.yml,
    # gitleaks.yml, trufflehog-scan.yml, zizmor.yml; never pin-stale again.
    uses: ./.github/workflows/security-scorecard.yml
    with:
      publish_results: false
